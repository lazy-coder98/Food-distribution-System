services:
  app:
    build: .
    container_name: food-distribution-system-api
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/food_distribution_system}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-minimum-32-byte-secret-preferably-64-plus-characters}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      EXPIRE_FOOD_POSTS_CRON: ${EXPIRE_FOOD_POSTS_CRON:-0 */10 * * * *}
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: food-distribution-system-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
