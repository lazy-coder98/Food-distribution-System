server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: food-distribution-system
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/food_distribution_system}
      auto-index-creation: true

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-very-long-production-grade-value-64-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  scheduler:
    expire-food-posts-cron: ${EXPIRE_FOOD_POSTS_CRON:0 */10 * * * *}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
    com.fooddistribution: INFO
